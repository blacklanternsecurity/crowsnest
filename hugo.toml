baseURL = "https://crowsnest.blacklanternsecurity.com/"
defaultContentLanguage = "en"
title = "Black Lantern Security: Crow's Nest"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pagination.pagerSize = 10

[minify]
disableXML = true
minifyOutput = true

# Allow raw HTML in markdown content. The compiler emits <details><summary>
# blocks for the "More this week" disclosures; without this, Goldmark
# strips the tags and the long-tail items render as a flat un-collapsed list.
[markup.goldmark.renderer]
unsafe = true

[params]
env = "production"
title = "Black Lantern Security: Crow's Nest"
description = "A curated roundup of security news, techniques, tools, and exploits from across the community."
keywords = ["security", "infosec", "tools", "exploits", "techniques", "writeups", "roundup", "blacklanternsecurity"]
author = "Black Lantern Security"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false

[params.homeInfoParams]
BannerImage = "/banner.png"
BannerAlt = "Crow's Nest — Black Lantern Security News"
Content = """
Welcome aboard. Crow's Nest is a curated roundup of news, techniques, tools, and exploits from across the security community, brought to you by [Black Lantern Security](https://www.blacklanternsecurity.com).
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/blacklanternsecurity"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 20

[[menu.main]]
identifier = "archives"
name = "Archives"
url = "/archives/"
weight = 30

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 40

[outputs]
home = ["HTML", "RSS", "JSON"]

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
limit = 10
keys = ["title", "permalink", "summary", "content"]
